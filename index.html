<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해트케 인플루언서 관리</title>
<style>
:root {
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--surface3:#2e2e2e;
  --border:#333;--text:#e8e8e8;--muted:#888;--primary:#4f8ef7;
  --success:#28a745;--warning:#ffc107;--danger:#e74c3c;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;font-size:14px;min-height:100vh}
#loading-bar{height:2px;background:var(--primary);position:fixed;top:0;left:0;width:0;z-index:999;transition:width .3s,opacity .3s}
#loading-bar.active{width:70%}
#loading-bar.done{width:100%;opacity:0}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:24px;position:sticky;top:0;z-index:100}
header h1{font-size:16px;font-weight:700;padding:16px 0;white-space:nowrap}
nav{display:flex}
nav button{background:none;border:none;color:var(--muted);padding:16px 16px;cursor:pointer;font-size:14px;border-bottom:2px solid transparent;transition:all .15s}
nav button.active{color:var(--primary);border-bottom-color:var(--primary)}
nav button:hover:not(.active){color:var(--text)}
#sync-badge{font-size:11px;color:var(--muted);padding:2px 8px;border-radius:10px;background:var(--surface2);display:none;margin-left:auto}
#sync-badge.show{display:inline-block}
.tab{display:none;padding:20px 24px;max-width:1300px;margin:0 auto}
.tab.active{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s}
.card:hover{border-color:var(--primary)}
.card-count{font-size:26px;font-weight:700;margin-bottom:3px}
.card-label{font-size:11px;color:var(--muted)}
.todo-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.todo-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
.todo-box h3{font-size:12px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.todo-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--surface2);border-radius:6px;margin-bottom:5px;cursor:pointer;transition:background .15s}
.todo-item:hover{background:var(--surface3)}
.todo-item:last-child{margin-bottom:0}
.todo-name{font-weight:500;font-size:13px}
.todo-right{display:flex;gap:5px;align-items:center}
.todo-stage{font-size:10px;padding:2px 7px;border-radius:20px}
.toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.toolbar input[type=text]{flex:1;min-width:150px}
.bulk-bar{display:none;background:var(--surface2);border:1px solid var(--primary);border-radius:8px;padding:8px 14px;margin-bottom:10px;align-items:center;gap:10px;flex-wrap:wrap}
.bulk-bar.show{display:flex}
.filter-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.filter-tab{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:11px;transition:all .15s;white-space:nowrap}
.filter-tab.active{border-color:var(--primary);color:var(--primary);background:#1a2540}
.filter-tab:hover:not(.active){color:var(--text);border-color:#555}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{background:var(--surface2);padding:9px 12px;text-align:left;font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap;border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody tr.selected{background:#1a2540}
tbody tr.optimistic{opacity:.6}
td{padding:9px 12px;vertical-align:middle}
.stage-badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.muted{color:var(--muted);font-size:12px}
.link-btn{color:var(--primary);text-decoration:none;font-size:11px;padding:2px 5px;background:#1a2540;border-radius:3px}
#detail-panel{position:fixed;top:0;right:-460px;width:460px;height:100vh;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;transition:right .25s ease;z-index:200}
#detail-panel.open{right:0}
.panel-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.panel-header h2{font-size:15px}
.panel-body{padding:18px 20px}
.timeline{margin-bottom:20px}
.tl-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:2px}
.tl-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;margin-top:1px}
.tl-dot.done{background:var(--success);color:#fff}
.tl-dot.current{background:var(--primary);color:#fff;box-shadow:0 0 0 3px rgba(79,142,247,.25)}
.tl-dot.pending{background:var(--surface3);color:var(--muted);border:1px solid var(--border)}
.tl-line{width:1px;height:14px;background:var(--border);margin-left:8px}
.tl-label{font-size:12px;padding:1px 0}
.tl-label.done{color:var(--muted)}
.tl-label.current{font-weight:600}
.tl-date{font-size:10px;color:var(--muted);margin-left:5px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
input[type=text],input[type=number],input[type=date],input[type=tel],textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:13px;outline:none;transition:border-color .15s}
input:focus,textarea:focus{border-color:var(--primary)}
textarea{resize:vertical;min-height:60px}
input[type=file]{background:var(--surface2);border:1px dashed var(--border);color:var(--text);padding:6px 10px;border-radius:6px;cursor:pointer;width:100%;font-size:12px}
.file-status{font-size:11px;color:var(--muted);display:block;margin-top:3px}
.file-status.ok{color:var(--success)}
.file-status.err{color:var(--danger)}
.auto-fill{background:var(--surface3)!important;color:var(--muted)!important}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#3d7df0}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#219a38}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#c0392b}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:#555;background:var(--surface2)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-block{width:100%}
.btn-group{display:flex;gap:7px;flex-wrap:wrap}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:300;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:100%;max-width:450px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;margin-bottom:16px}
.modal-footer{display:flex;gap:7px;justify-content:flex-end;margin-top:16px}
.sett-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:16px}
.sett-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.sett-row:last-child{border-bottom:none}
.sett-total{font-size:17px;font-weight:700;color:var(--primary)}
.empty{text-align:center;padding:40px;color:var(--muted)}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.text-muted{color:var(--muted);font-size:11px}
.mt-8{margin-top:8px}
.section-title{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;margin-top:16px}
.cb-row{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.cb-row input[type=checkbox]{width:auto}
.info-row{display:flex;gap:7px;align-items:center}
.copy-row{display:flex;gap:6px;align-items:center}
.copy-row input{flex:1}
.role-section{margin-bottom:14px}
.role-header{font-size:12px;font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.role-header.part{color:#ffc107}
.role-header.boss{color:#e74c3c}
.role-section .cards{margin-bottom:0}
.product-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.ptab{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap}
.ptab.active{background:var(--primary);border-color:var(--primary);color:#fff}
.ptab:hover:not(.active){border-color:#555}
.ptab-add{color:var(--primary);border-style:dashed}
@media(max-width:600px){
  .todo-grid{grid-template-columns:1fr}
  #detail-panel{width:100%;right:-100%}
  .cards{grid-template-columns:repeat(3,1fr)}
  header{padding:0 14px;gap:14px}
  .tab{padding:14px}
}
</style>
</head>
<body>
<div id="loading-bar"></div>
<div id="app">
  <header>
    <h1>🎯 해트케 인플루언서</h1>
    <nav>
      <button class="active" onclick="switchTab('dashboard',this)">대시보드</button>
      <button onclick="switchTab('management',this)">인플루언서 관리</button>
      <button onclick="switchTab('settlement',this)">정산</button>
    </nav>
    <span id="sync-badge">동기화 중...</span>
  </header>

  <div id="tab-dashboard" class="tab active">
    <div id="stage-cards"></div>
    <div class="todo-grid">
      <div class="todo-box">
        <h3><span style="color:#e74c3c">🔴</span> 내 할 일</h3>
        <div id="boss-todo"></div>
      </div>
      <div class="todo-box">
        <h3><span style="color:#ffc107">🟡</span> 아르바이트 할 일</h3>
        <div id="part-todo"></div>
      </div>
    </div>
  </div>

  <div id="tab-management" class="tab">
    <div id="product-tabs" class="product-tabs"></div>
    <div class="toolbar">
      <input type="text" id="search-input" placeholder="계정명 또는 이름 검색..." oninput="renderList()">
      <button class="btn btn-primary" onclick="openAddModal()">+ 추가</button>
    </div>
    <div id="bulk-bar" class="bulk-bar">
      <span id="bulk-count" style="font-weight:600;color:var(--primary)"></span>
      <button class="btn btn-primary btn-sm" onclick="bulkAdvance()">→ 다음 단계로</button>
      <button class="btn btn-sm" style="background:none;border:1px solid var(--danger);color:var(--danger)" onclick="bulkReject()">거절됨으로</button>
      <button class="btn btn-outline btn-sm" onclick="clearSelection()">✕ 해제</button>
    </div>
    <div id="filter-tabs" class="filter-tabs"></div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="width:32px"><input type="checkbox" id="select-all" onchange="toggleSelectAll(event)"></th>
          <th>계정명</th><th>이름</th><th>팔로워</th><th>모집일</th><th>단계</th><th>DM발송</th><th>협찬성사</th><th style="text-align:right">DM수당</th><th style="text-align:right">성사수당</th><th style="text-align:right">소계</th><th>릴스 링크</th>
        </tr></thead>
        <tbody id="influencer-table"><tr><td colspan="12"><div class="empty">로딩 중...</div></td></tr></tbody>
      </table>
    </div>
  </div>

  <div id="tab-settlement" class="tab">
    <div class="toolbar">
      <input type="month" id="settlement-month" onchange="renderSettlement()">
      <button class="btn btn-outline btn-sm" onclick="setThisMonth()">이번달</button>
    </div>
    <div class="sett-box">
      <div class="sett-row"><span>DM 발송 건수</span><span id="dm-count">0건 × 2,000원 = <b>0원</b></span></div>
      <div class="sett-row"><span>협찬 완료 건수</span><span id="complete-count">0건 × 20,000원 = <b>0원</b></span></div>
      <div class="sett-row"><span style="font-weight:600">합계</span><span class="sett-total" id="total-pay">0원</span></div>
      <div style="margin-top:12px"><button class="btn btn-outline btn-sm" onclick="copySettlement()">📋 클립보드 복사</button></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>닉네임</th><th>이름</th><th>DM 발송일</th><th>협찬 완료일</th><th>DM</th><th>협찬</th></tr></thead>
        <tbody id="settlement-table"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="overlay" id="add-overlay" onclick="closeAddModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>인플루언서 추가</h3>
    <div class="fg"><label>협찬 제품</label><input type="text" id="add-product" list="product-datalist" placeholder="제품명 입력 또는 선택"></div>
    <div class="fg"><label>인스타그램 URL</label><input type="text" id="insta-url" placeholder="https://www.instagram.com/계정명/reels/" oninput="parseUrl()"></div>
    <div class="fg"><label>계정명 (자동)</label><input type="text" id="add-instagram-id" class="auto-fill" readonly></div>
    <div class="fg"><label>릴스 주소 (자동)</label><input type="text" id="add-reels-url" class="auto-fill" readonly></div>
    <div class="fg"><label>이름 (별칭)</label><input type="text" id="add-name" placeholder="홍길동"></div>
    <div class="fg"><label>팔로워 수</label><input type="text" id="add-followers" placeholder="12300 또는 12.3만"></div>
    <div class="fg"><label>모집일</label><input type="date" id="add-recruited-date"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeAddModal()">취소</button>
      <button class="btn btn-primary" onclick="submitAdd()">추가</button>
    </div>
  </div>
</div>

<div id="detail-panel">
  <div class="panel-header">
    <h2 id="panel-title">-</h2>
    <button class="btn btn-outline btn-sm" onclick="closePanel()">✕ 닫기</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<datalist id="product-datalist"></datalist>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbyu2pRScWpq3WhsK9aA7WhEXWYlGvA_0YiG4xuX8YmBP34A8BX9dUph2QgcfbuLGdo/exec';

const STAGES=[
  {id:0, name:'리스팅 목록',           color:'#6c757d'},
  {id:2, name:'DM 발송 완료/ 진행 대기', color:'#0dcaf0'},
  {id:4, name:'계약서발송/수집',         color:'#20c997'},
  {id:6, name:'제품 발송',              color:'#8b5cf6'},
  {id:5, name:'광고 코드/입금정보 수집', color:'#3b82f6'},
  {id:7, name:'광고세팅/입금',          color:'#ec4899'},
];

let influencers=[],selectedId=null,currentFilter='all';
let selectedIds=new Set();
let stage2ProductOnly=false;
let currentProduct='all';
const uploadedFiles={};

function getNextStageId(s){
  const n=Number(s);
  if(n<=1)return 2;
  if(n===2)return 4;
  if(n===4)return 6;
  if(n===6)return 5;
  if(n===5)return 7;
  return null;
}
function needsContactInfo(inf){
  return !!inf&&inf.status==='active'&&Number(inf.stage)===2&&(!(inf.influencer_name||'').trim()||!(inf.phone||'').trim()||!(inf.address||'').trim());
}
function escHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getStageInfo(stageId){
  const s=Number(stageId);
  const d=s===1?0:s;
  return STAGES.find(st=>st.id===d)||{name:'알 수 없음',color:'#888'};
}
function getStageRole(stageId){const s=Number(stageId);return (s===4||s===7)?'boss':'part';}
function formatDate(d){
  if(!d)return'-';
  const s=String(d).trim();
  if(!s||s==='undefined'||s==='null')return'-';
  return s.length>=10?s.slice(0,10):s;
}
function formatFollowers(n){
  const num=parseInt(String(n).replace(/[^0-9]/g,''));
  if(isNaN(num))return n;
  if(num>=10000)return(num/10000).toFixed(1)+'만';
  if(num>=1000)return(num/1000).toFixed(1)+'천';
  return String(num);
}
function showLoading(){document.getElementById('loading-bar').className='active'}
function hideLoading(){const b=document.getElementById('loading-bar');b.className='done';setTimeout(()=>b.className='',400)}
let syncCount=0;
function syncStart(){syncCount++;document.getElementById('sync-badge').classList.add('show')}
function syncEnd(){syncCount=Math.max(0,syncCount-1);if(!syncCount)document.getElementById('sync-badge').classList.remove('show')}

async function api(action,data){
  try{
    const url=new URL(SCRIPT_URL);url.searchParams.set('action',action);
    if(data)url.searchParams.set('data',JSON.stringify(data));
    const res=await fetch(url.toString());return await res.json();
  }catch(e){return{success:false,error:e.message}}
}
async function uploadToDrive(file,label){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=async(e)=>{
      try{
        const base64Data=e.target.result.split(',')[1];
        const res=await fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'uploadFile',fileName:label+'_'+Date.now()+'_'+file.name,mimeType:file.type||'application/octet-stream',base64Data})});
        const r=await res.json();resolve(r.success?r.url:null);
      }catch{resolve(null)}
    };
    reader.readAsDataURL(file);
  });
}
async function handleFileSelect(inputId,statusId,label){
  const input=document.getElementById(inputId);const status=document.getElementById(statusId);
  if(!input||!input.files[0])return;
  status.textContent='업로드 중...';status.className='file-status';
  const url=await uploadToDrive(input.files[0],label);
  if(url){uploadedFiles[inputId]=url;status.innerHTML='✓ <a href="'+url+'" target="_blank" style="color:var(--success)">업로드 완료</a>';status.className='file-status ok';}
  else{status.textContent='✗ 업로드 실패';status.className='file-status err';}
}
function localGet(id){return influencers.find(i=>String(i.id)===String(id))}
function localUpdate(id,changes){const inf=localGet(id);if(inf)Object.assign(inf,changes)}
function localRemove(id){influencers=influencers.filter(i=>String(i.id)!==String(id))}
function localAdd(item){influencers.unshift(item)}

window.onload=()=>{
  document.getElementById('add-recruited-date').value=new Date().toISOString().split('T')[0];
  setThisMonth();showLoading();
  api('getAll').then(r=>{hideLoading();if(r.success){influencers=r.data.filter(d=>d.status!=='deleted');render()}});
};
function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');btn.classList.add('active');closePanel();
  if(name==='settlement')renderSettlement();
}
function render(){renderDashboard();renderProductTabs();refreshProductDatalist();renderFilterTabs();renderList()}

function renderDashboard(){
  const active=influencers.filter(i=>i.status==='active');
  const rejected=influencers.filter(i=>i.status==='rejected');
  const cardHtml=s=>{
    const count=s.id===0?active.filter(i=>Number(i.stage)===0||Number(i.stage)===1).length:active.filter(i=>Number(i.stage)===s.id).length;
    return`<div class="card" style="border-top:3px solid ${s.color}" onclick="jumpToFilter(${s.id})"><div class="card-count" style="color:${s.color}">${count}</div><div class="card-label">${s.name}</div></div>`;
  };
  const partCards=STAGES.filter(s=>getStageRole(s.id)==='part').map(cardHtml).join('');
  const bossCards=STAGES.filter(s=>getStageRole(s.id)==='boss').map(cardHtml).join('');
  const rejCard=`<div class="card" style="border-top:3px solid #6c757d" onclick="jumpToFilter('rejected')"><div class="card-count" style="color:#9aa0a6">${rejected.length}</div><div class="card-label">거절됨</div></div>`;
  document.getElementById('stage-cards').innerHTML=
    `<div class="role-section"><div class="role-header part">🟡 아르바이트 담당</div><div class="cards">${partCards}</div></div>`+
    `<div class="role-section"><div class="role-header boss">🔴 사장 담당</div><div class="cards">${bossCards}</div></div>`+
    `<div class="role-section"><div class="role-header" style="color:var(--muted)">기타</div><div class="cards">${rejCard}</div></div>`;

  const todoItemHtml=i=>{const s=getStageInfo(i.stage);const canAdv=getNextStageId(Number(i.stage))!==null;return`<div class="todo-item" onclick="openDetail('${i.id}')"><span class="todo-name">@${i.instagram_id||i.nickname}</span><div class="todo-right"><span class="todo-stage" style="background:${s.color}22;color:${s.color}">${s.name}</span>${canAdv?`<button class="btn btn-outline btn-sm" onclick="quickAdvance('${i.id}',event)" style="padding:2px 7px">→</button>`:''}</div></div>`};
  const emptyTodo='<div class="text-muted" style="padding:6px 0">할 일 없음 ✓</div>';
  const bossItems=active.filter(i=>{const s=Number(i.stage);return s===4||s===7});
  document.getElementById('boss-todo').innerHTML=bossItems.length===0?emptyTodo:bossItems.map(todoItemHtml).join('');
  const partItems=active.filter(i=>{const s=Number(i.stage);return s===0||s===1||s===2||s===5||s===6});
  document.getElementById('part-todo').innerHTML=partItems.length===0?emptyTodo:partItems.map(todoItemHtml).join('');
}

function escJs(s){return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function getProducts(){
  const fromData=influencers.filter(i=>i.status!=='deleted'&&String(i.product||'').trim()).map(i=>String(i.product).trim());
  let fromLocal=[];try{fromLocal=JSON.parse(localStorage.getItem('hattke_products')||'[]')}catch(e){}
  return [...new Set([...fromLocal,...fromData])].sort((a,b)=>a.localeCompare(b,'ko'));
}
function addProduct(name){
  name=(name||'').trim();if(!name)return;
  let local=[];try{local=JSON.parse(localStorage.getItem('hattke_products')||'[]')}catch(e){}
  if(!local.includes(name)){local.push(name);localStorage.setItem('hattke_products',JSON.stringify(local));}
}
function productMatch(i){
  if(currentProduct==='all')return true;
  const p=String(i.product||'').trim();
  return currentProduct==='__none__'?!p:p===currentProduct;
}
function refreshProductDatalist(){
  const dl=document.getElementById('product-datalist');
  if(dl)dl.innerHTML=getProducts().map(p=>`<option value="${escHtml(p)}"></option>`).join('');
}
function renderProductTabs(){
  const products=getProducts();
  const cnt=pred=>influencers.filter(i=>i.status!=='deleted'&&pred(i)).length;
  let html=`<div class="ptab ${currentProduct==='all'?'active':''}" onclick="setProduct('all')">전체 (${cnt(()=>true)})</div>`;
  products.forEach(p=>{html+=`<div class="ptab ${currentProduct===p?'active':''}" onclick="setProduct('${escJs(p)}')">${escHtml(p)} (${cnt(i=>String(i.product||'').trim()===p)})</div>`;});
  html+=`<div class="ptab ${currentProduct==='__none__'?'active':''}" onclick="setProduct('__none__')">미지정 (${cnt(i=>!String(i.product||'').trim())})</div>`;
  html+=`<div class="ptab ptab-add" onclick="promptAddProduct()">+ 제품 추가</div>`;
  const el=document.getElementById('product-tabs');if(el)el.innerHTML=html;
}
function setProduct(p){currentProduct=p;renderProductTabs();renderFilterTabs();renderList();}
function promptAddProduct(){
  const name=prompt('새 제품 분류 이름을 입력하세요');
  if(name===null)return;
  const n=name.trim();if(!n)return;
  addProduct(n);currentProduct=n;
  refreshProductDatalist();renderProductTabs();renderFilterTabs();renderList();
}
function renderFilterTabs(){
  const active=influencers.filter(i=>i.status==='active'&&productMatch(i));
  let html=`<div class="filter-tab ${currentFilter==='all'?'active':''}" onclick="setFilter('all')">전체 (${active.length})</div>`;
  STAGES.forEach(s=>{
    const count=s.id===0?active.filter(i=>Number(i.stage)===0||Number(i.stage)===1).length:active.filter(i=>Number(i.stage)===s.id).length;
    html+=`<div class="filter-tab ${currentFilter===s.id?'active':''}" onclick="setFilter(${s.id})">${getStageRole(s.id)==='boss'?'🔴':'🟡'} ${s.name} (${count})</div>`;
  });
  const rejCount=influencers.filter(i=>i.status==='rejected'&&productMatch(i)).length;
  html+=`<div class="filter-tab ${currentFilter==='rejected'?'active':''}" onclick="setFilter('rejected')">거절됨 (${rejCount})</div>`;
  const doneCount=influencers.filter(i=>i.status==='done'&&productMatch(i)).length;
  html+=`<div class="filter-tab ${currentFilter==='done'?'active':''}" onclick="setFilter('done')">완료됨 (${doneCount})</div>`;
  document.getElementById('filter-tabs').innerHTML=html;
}
function setFilter(f){currentFilter=f;renderFilterTabs();renderList()}
function jumpToFilter(id){switchTab('management',document.querySelectorAll('nav button')[1]);setFilter(id)}

function getFilteredList(){
  const search=(document.getElementById('search-input').value||'').toLowerCase();
  let list;
  if(currentFilter==='rejected')list=influencers.filter(i=>i.status==='rejected');
  else if(currentFilter==='done')list=influencers.filter(i=>i.status==='done');
  else if(currentFilter!=='all'){
    list=currentFilter===0?influencers.filter(i=>i.status==='active'&&(Number(i.stage)===0||Number(i.stage)===1)):influencers.filter(i=>i.status==='active'&&Number(i.stage)===currentFilter);
  }else list=influencers.filter(i=>i.status==='active');
  list=list.filter(productMatch);
  if(search)list=list.filter(i=>(i.instagram_id||'').toLowerCase().includes(search)||(i.name||'').toLowerCase().includes(search));
  return list;
}
function renderList(){
  const list=getFilteredList();
  const tbody=document.getElementById('influencer-table');
  if(list.length===0){tbody.innerHTML=`<tr><td colspan="12"><div class="empty">인플루언서가 없습니다.</div></td></tr>`;return}

    const si=i.status==='rejected'?{name:'거절됨',color:'#e74c3c'}:i.status==='done'?{name:'완료됨',color:'#22c55e'}:getStageInfo(i.stage);
    const isListing=i.status==='active'&&(Number(i.stage)===0||Number(i.stage)===1);
    const isDmStage=i.status==='active'&&Number(i.stage)===2;
    const isRejected=i.status==='rejected';
    const dmForced=!isListing&&!isRejected;

    const spY=i.sponsorship_done==='Y';
    const dmPay=dmY?2000:0;const spPay=spY?20000:0;const subtotal=dmPay+spPay;
    let dmBtn;
    if(isListing){
      dmBtn=`<button class="btn btn-sm" style="min-width:32px;background:${i.dm_sent==='Y'?'var(--success)':'var(--surface3)'};color:${i.dm_sent==='Y'?'#fff':'var(--muted)'};border:1px solid ${i.dm_sent==='Y'?'var(--success)':'var(--border)'}" onclick="dmAndAdvance('${i.id}',event)">${i.dm_sent==='Y'?'Y':'N'}</button>`;
    }else if(isDmStage){
      dmBtn=`<button class="btn btn-sm" title="다시 누르면 리스팅 목록으로 되돌립니다" style="min-width:32px;background:var(--success);color:#fff;border:1px solid var(--success)" onclick="dmRevert('${i.id}',event)">Y</button>`;
    }else if(isRejected){
      dmBtn=`<button class="btn btn-sm" style="min-width:32px;background:${i.dm_sent==='Y'?'var(--success)':'var(--surface3)'};color:${i.dm_sent==='Y'?'#fff':'var(--muted)'};border:1px solid ${i.dm_sent==='Y'?'var(--success)':'var(--border)'}" onclick="toggleDm('${i.id}',event)">${i.dm_sent==='Y'?'Y':'N'}</button>`;
    }else{
      dmBtn=`<span class="btn btn-sm" style="min-width:32px;background:var(--success);color:#fff;border:1px solid var(--success);cursor:default">Y</span>`;
    }
    return`<tr class="${String(selectedId)===String(i.id)?'selected':''} ${i._opt?'optimistic':''}" onclick="openDetail('${i.id}')">
      <td onclick="event.stopPropagation()"><input type="checkbox" ${selectedIds.has(String(i.id))?'checked':''} onchange="toggleSelect('${i.id}',event)"></td>
      <td><b>@${i.instagram_id||i.nickname||'-'}</b></td><td>${i.name||'-'}</td>
      <td class="muted">${i.followers?formatFollowers(i.followers):'-'}</td>
      <td class="muted">${formatDate(i.recruited_date)}</td>
      <td><span class="stage-badge" style="background:${si.color}22;color:${si.color}">${si.name}</span></td>
      <td onclick="event.stopPropagation()" style="text-align:center">${dmBtn}</td>
      <td onclick="event.stopPropagation()" style="text-align:center">
        <button class="btn btn-sm" style="min-width:32px;background:${spY?'var(--success)':'var(--surface3)'};color:${spY?'#fff':'var(--muted)'};border:1px solid ${spY?'var(--success)':'var(--border)'}" onclick="toggleSponsorship('${i.id}',event)">${spY?'Y':'N'}</button>
      </td>
      <td style="text-align:right;color:${dmY?'#ffc107':'var(--muted)'};font-size:12px">${dmY?'2,000원':'-'}</td>
      <td style="text-align:right;color:${spY?'#4f8ef7':'var(--muted)'};font-size:12px">${spY?'20,000원':'-'}</td>
      <td style="text-align:right;font-weight:${subtotal>0?'600':'400'};color:${subtotal>0?'#22c55e':'var(--muted)'};font-size:12px">${subtotal>0?subtotal.toLocaleString()+'원':'-'}</td>
      <td onclick="event.stopPropagation()" style="white-space:nowrap">
        ${i.reels_url?`<a class="link-btn" href="${i.reels_url}" target="_blank">릴스↗</a>`:'—'}
      </td>
    </tr>`;
  }).join('');
  const sa=document.getElementById('select-all');
  if(sa){const ac=list.length>0&&list.every(i=>selectedIds.has(String(i.id)));sa.checked=ac;sa.indeterminate=!ac&&list.some(i=>selectedIds.has(String(i.id)))}
}

async function toggleDm(id,e){
  e.stopPropagation();
  const inf=localGet(id);if(!inf)return;
  const prev=inf.dm_sent;const next=prev==='Y'?'N':'Y';
  localUpdate(id,{dm_sent:next});renderList();
  syncStart();const r=await api('update',{id,dm_sent:next});syncEnd();
  if(!r.success){localUpdate(id,{dm_sent:prev});renderList()}
}
async function dmAndAdvance(id,e){
  e.stopPropagation();
  const inf=localGet(id);if(!inf||inf.status!=='active')return;
  const prevStage=Number(inf.stage);const prevDm=inf.dm_sent;const prevDate=inf.dm_sent_date;
  const nextStage=getNextStageId(prevStage);if(nextStage===null)return;
  const dm_sent_date=inf.dm_sent_date||new Date().toISOString().split('T')[0];
  localUpdate(id,{dm_sent:'Y',stage:nextStage,dm_sent_date});render();
  syncStart();const r=await api('update',{id,dm_sent:'Y',stage:nextStage,dm_sent_date});syncEnd();
  if(!r.success){localUpdate(id,{dm_sent:prevDm,stage:prevStage,dm_sent_date:prevDate});render();alert('저장 실패: '+r.error)}
}
async function dmRevert(id,e){
  e.stopPropagation();
  const inf=localGet(id);if(!inf||inf.status!=='active')return;
  const prevStage=Number(inf.stage);const prevDm=inf.dm_sent;const prevDate=inf.dm_sent_date;
  localUpdate(id,{dm_sent:'N',stage:0,dm_sent_date:''});render();if(String(selectedId)===String(id))renderPanel();
  syncStart();const r=await api('update',{id,dm_sent:'N',stage:0,dm_sent_date:''});syncEnd();
  if(!r.success){localUpdate(id,{dm_sent:prevDm,stage:prevStage,dm_sent_date:prevDate});render();if(String(selectedId)===String(id))renderPanel();alert('저장 실패: '+r.error)}
}
async function toggleSponsorship(id,e){
  e.stopPropagation();
  const inf=localGet(id);if(!inf)return;
  const prev=inf.sponsorship_done;const next=prev==='Y'?'N':'Y';
  localUpdate(id,{sponsorship_done:next});renderList();
  syncStart();const r=await api('update',{id,sponsorship_done:next});syncEnd();
  if(!r.success){localUpdate(id,{sponsorship_done:prev});renderList()}
}
function toggleSelectAll(e){const list=getFilteredList();if(e.target.checked)list.forEach(i=>selectedIds.add(String(i.id)));else list.forEach(i=>selectedIds.delete(String(i.id)));updateBulkBar();renderList()}
function toggleSelect(id,e){e.stopPropagation();if(selectedIds.has(String(id)))selectedIds.delete(String(id));else selectedIds.add(String(id));updateBulkBar();renderList()}
function updateBulkBar(){const n=selectedIds.size;document.getElementById('bulk-bar').classList.toggle('show',n>0);document.getElementById('bulk-count').textContent=n+'개 선택됨'}
function clearSelection(){selectedIds.clear();updateBulkBar();renderList()}

async function bulkAdvance(){
  const ids=[...selectedIds];
  let blocked=0;const advanced=[];
  ids.forEach(id=>{const inf=localGet(id);if(!inf||inf.status!=='active')return;if(needsContactInfo(inf)){blocked++;return}const next=getNextStageId(Number(inf.stage));if(next!==null){localUpdate(id,{stage:next});advanced.push(id)}});
  selectedIds.clear();updateBulkBar();render();
  syncStart();await Promise.all(advanced.map(id=>{const inf=localGet(id);return inf?api('update',{id,stage:inf.stage}):Promise.resolve({success:true})}));syncEnd();
  if(blocked>0)alert(blocked+'명은 실명·연락처가 없어 DM 발송 단계에 그대로 두었습니다. 개별로 입력 후 진행해주세요.');
}
async function bulkReject(){
  if(!confirm(selectedIds.size+'개를 거절 처리할까요?'))return;
  const ids=[...selectedIds];
  ids.forEach(id=>{const inf=localGet(id);if(inf&&inf.status==='active')localUpdate(id,{status:'rejected'})});
  selectedIds.clear();updateBulkBar();render();
  syncStart();await Promise.all(ids.map(id=>api('update',{id,status:'rejected'})));syncEnd();
}
async function quickAdvance(id,e){
  if(e)e.stopPropagation();
  const inf=localGet(id);if(!inf||inf.status!=='active')return;
  if(needsContactInfo(inf)){alert('실명과 연락처를 입력해야 계약서 발송(다음 단계)으로 넘어갈 수 있습니다.');openDetail(id);return}
  const next=getNextStageId(Number(inf.stage));if(next===null)return;
  const prev=Number(inf.stage);localUpdate(id,{stage:next});render();if(String(selectedId)===String(id))renderPanel();
  syncStart();const r=await api('update',{id,stage:next});syncEnd();
  if(!r.success){localUpdate(id,{stage:prev});render();alert('저장 실패: '+r.error)}
}

function openAddModal(){
  ['insta-url','add-instagram-id','add-reels-url','add-name','add-followers'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('add-recruited-date').value=new Date().toISOString().split('T')[0];
  refreshProductDatalist();
  document.getElementById('add-product').value=(currentProduct!=='all'&&currentProduct!=='__none__')?currentProduct:'';
  document.getElementById('add-overlay').classList.add('open');
}
function closeAddModal(e){if(!e||e.target===document.getElementById('add-overlay'))document.getElementById('add-overlay').classList.remove('open')}
function parseUrl(){const m=document.getElementById('insta-url').value.trim().match(/instagram\.com\/([^\/\?]+)/);if(m){const u=m[1];document.getElementById('add-instagram-id').value=u;document.getElementById('add-reels-url').value=`https://www.instagram.com/${u}/reels/`}}
async function submitAdd(){
  const instagram_id=document.getElementById('add-instagram-id').value.trim();
  if(!instagram_id)return alert('URL을 먼저 입력해주세요.');
  const tempId='temp_'+Date.now();
  const item={id:tempId,_opt:true,instagram_id,nickname:instagram_id,name:document.getElementById('add-name').value.trim(),followers:document.getElementById('add-followers').value.trim(),reels_url:document.getElementById('add-reels-url').value.trim(),recruited_date:document.getElementById('add-recruited-date').value,product:document.getElementById('add-product').value.trim(),stage:0,status:'active',memo:''};
  if(item.product)addProduct(item.product);
  localAdd(item);closeAddModal();render();
  syncStart();const r=await api('add',item);syncEnd();
  if(r.success){localUpdate(tempId,{id:r.id,_opt:false});render()}
  else{localRemove(tempId);render();alert('추가 실패: '+r.error)}
}

function openDetail(id){selectedId=String(id);renderList();renderPanel();document.getElementById('detail-panel').classList.add('open')}
function closePanel(){selectedId=null;document.getElementById('detail-panel').classList.remove('open');renderList()}

    <div class="btn-group">
      <button class="btn btn-primary" onclick="completeDmStage()">협찬 성사 완료</button>
      <button class="btn btn-danger btn-sm" onclick="rejectInfluencer()">✕ 거절됨으로</button>
    </div>`;
  }else if(stage===4){
    const v=formatDate(inf.contract_sent_date);
    actionHtml+=`<div class="fg"><label>계약 완료일</label><input type="date" id="p-contract-date" value="${v!=='-'?v:today}"></div>
    <div class="fg"><label>계약서 파일</label>
      <input type="file" id="p-contract-file" accept=".pdf,.jpg,.jpeg,.png,.heic" onchange="handleFileSelect('p-contract-file','contract-status','계약서')">
      <span id="contract-status" class="file-status">${inf.contract_file?`<a href="${inf.contract_file}" target="_blank" style="color:var(--success)">✓ 기존 파일 보기</a>`:''}</span>
    </div>
    <div class="fg"><label>특이사항 (진행 단가 등)</label><textarea id="p-special-note">${inf.special_note||''}</textarea></div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="completeContract()">계약 완료 →</button>
      <button class="btn btn-danger btn-sm" onclick="rejectInfluencer()">✕ 거절됨으로</button>
    </div>`;
  }else if(stage===6){
    actionHtml+=`<p class="text-muted" style="margin-bottom:10px">아래 정보를 복사해 제품을 발송한 뒤 '제품 발송 완료'를 눌러주세요.</p>
    <div class="fg"><label>실명 (받는 분)</label><div class="copy-row"><input type="text" value="${escHtml(inf.influencer_name)}" readonly><button class="btn btn-outline btn-sm" onclick="copyField('influencer_name',event)">복사</button></div></div>
    <div class="fg"><label>연락처</label><div class="copy-row"><input type="text" value="${escHtml(inf.phone)}" readonly><button class="btn btn-outline btn-sm" onclick="copyField('phone',event)">복사</button></div></div>
    <div class="fg"><label>배송 주소</label><div class="copy-row"><textarea readonly style="min-height:48px;flex:1">${escHtml(inf.address)}</textarea><button class="btn btn-outline btn-sm" onclick="copyField('address',event)">복사</button></div></div>
    <button class="btn btn-outline btn-sm btn-block" style="margin-bottom:10px" onclick="copyField('all',event)">📋 실명·연락처·주소 한 번에 복사</button>
    <button class="btn btn-primary" onclick="completeProductShip()">제품 발송 완료 →</button>`;
  }else if(stage===5){
    const v=formatDate(inf.product_sent_date);const isProductOnly=inf.product_only==='Y';
    actionHtml+=`<div class="fg"><label>제품 발송일</label><input type="date" id="p-product-date" value="${v!=='-'?v:today}"></div>
    <div class="fg"><label>광고 코드</label><input type="text" id="p-ad-code" value="${inf.ad_code||''}" placeholder="광고 코드 입력"></div>
    <div class="cb-row" style="margin-bottom:10px">
      <input type="checkbox" id="p-product-only" ${isProductOnly?'checked':''} onchange="toggleProductOnly(this.checked)">
      <label for="p-product-only" style="font-size:13px">제품만 협찬 (통장사본/신분증 불필요)</label>
    </div>
    <div id="p-files-section" style="${isProductOnly?'display:none':''}">
      <div class="fg"><label>통장사본</label>
        <input type="file" id="p-bankbook-file" accept=".pdf,.jpg,.jpeg,.png,.heic" onchange="handleFileSelect('p-bankbook-file','bankbook-status','통장사본')">
        <span id="bankbook-status" class="file-status">${inf.bankbook_file?`<a href="${inf.bankbook_file}" target="_blank" style="color:var(--success)">✓ 기존 파일 보기</a>`:''}</span>
      </div>
      <div class="fg"><label>신분증</label>
        <input type="file" id="p-id-file" accept=".pdf,.jpg,.jpeg,.png,.heic" onchange="handleFileSelect('p-id-file','id-status','신분증')">
        <span id="id-status" class="file-status">${inf.id_file?`<a href="${inf.id_file}" target="_blank" style="color:var(--success)">✓ 기존 파일 보기</a>`:''}</span>
      </div>
    </div>
    <button class="btn btn-primary" onclick="completeProduct()">협찬 완료</button>`;
  }else if(stage===7){
    const vp=formatDate(inf.payment_date);
    actionHtml+=`<p class="text-muted" style="margin-bottom:10px">광고 세팅 및 인플루언서 입금을 진행해주세요.</p>
    <div class="fg"><label>광고코드 (복사용)</label>
      <div class="copy-row"><input type="text" value="${inf.ad_code||''}" readonly><button class="btn btn-outline btn-sm" onclick="copyText('${inf.ad_code||''}')">복사</button></div>
    </div>
    <div class="fg"><label>입금일</label><input type="date" id="p-payment-date" value="${vp!=='-'?vp:today}"></div>
    <button class="btn btn-success" onclick="completeAll()">✓ 광고세팅 및 입금 완료</button>`;
  }else{
    actionHtml+=`<p style="color:#22c55e;font-weight:600">✓ 처리 완료</p>`;
  }
  document.getElementById('panel-body').innerHTML=tlHtml+infoHtml+actionHtml;
}

function toggleProductOnly(checked){const sec=document.getElementById('p-files-section');if(sec)sec.style.display=checked?'none':''}
function copyText(text){
  if(!text||text==='-')return;
  navigator.clipboard.writeText(text).then(()=>{const btn=event.target;const orig=btn.textContent;btn.textContent='✓복사됨';setTimeout(()=>btn.textContent=orig,1500)});
}

async function saveBasicInfo(){
  const cur=localGet(selectedId);
  const elInf=document.getElementById('p-inf-name'),elPhone=document.getElementById('p-phone'),elProduct=document.getElementById('p-product');
  const name=document.getElementById('p-name').value;
  const product=elProduct?elProduct.value.trim():(cur.product||'');
  const influencer_name=elInf?elInf.value:(cur.influencer_name||'');
  const phone=elPhone?elPhone.value:(cur.phone||'');
  const followers=document.getElementById('p-followers').value,recruited_date=document.getElementById('p-recruited').value,memo=document.getElementById('p-memo').value;
  if(product)addProduct(product);
  const backup={...cur};localUpdate(selectedId,{name,product,influencer_name,phone,followers,recruited_date,memo});renderPanel();renderDashboard();renderProductTabs();refreshProductDatalist();
  syncStart();const r=await api('update',{id:selectedId,name,product,influencer_name,phone,followers,recruited_date,memo});syncEnd();
  if(!r.success){localUpdate(selectedId,backup);renderPanel();alert('저장 실패: '+r.error)}
}
async function completeDmStage(){
  const inf=localGet(selectedId);if(!inf)return;
  const influencer_name=(document.getElementById('p-real-name').value||'').trim();
  const phone=(document.getElementById('p-real-phone').value||'').trim();
  const address=(document.getElementById('p-address').value||'').trim();
  if(!influencer_name||!phone||!address){alert('실명·연락처·주소를 모두 입력해야 다음 단계로 넘어갈 수 있습니다.');return}
  const productOnly=stage2ProductOnly;
  const dm_sent_date=inf.dm_sent_date||new Date().toISOString().split('T')[0];
  const changes={influencer_name,phone,address,dm_sent:'Y',dm_sent_date};
  if(productOnly){
    changes.stage=6;changes.product_only='Y';
  }else{
    changes.stage=getNextStageId(Number(inf.stage));
  }
  const backup={...inf};
  localUpdate(selectedId,changes);render();renderPanel();
  syncStart();const r=await api('update',Object.assign({id:selectedId},changes));syncEnd();
  if(!r.success){localUpdate(selectedId,backup);render();renderPanel();alert('저장 실패: '+(r.error||''))}
}
function toggleStage2ProductOnly(){
  stage2ProductOnly=!stage2ProductOnly;
  const btn=document.getElementById('p-po-btn');
  if(btn){btn.className='btn btn-sm '+(stage2ProductOnly?'btn-success':'btn-outline');btn.innerHTML='📦 제품만 협찬'+(stage2ProductOnly?' ✓':'');}
}
function copyField(field,e){
  const inf=localGet(selectedId);if(!inf)return;
  const v=field==='all'?[inf.influencer_name,inf.phone,inf.address].map(x=>String(x||'').trim()).filter(Boolean).join('\n'):String(inf[field]||'').trim();
  if(!v)return;
  navigator.clipboard.writeText(v).then(()=>{if(e&&e.target){const b=e.target;const o=b.textContent;b.textContent='✓복사됨';setTimeout(()=>b.textContent=o,1500)}});
}
async function completeProductShip(){
  const inf=localGet(selectedId);if(!inf)return;
  const next=getNextStageId(Number(inf.stage));if(next===null)return;
  const product_sent_date=inf.product_sent_date||new Date().toISOString().split('T')[0];
  const backup={...inf};
  localUpdate(selectedId,{stage:next,product_sent_date});render();renderPanel();
  syncStart();const r=await api('update',{id:selectedId,stage:next,product_sent_date});syncEnd();
  if(!r.success){localUpdate(selectedId,backup);render();renderPanel();alert('저장 실패: '+(r.error||''))}
}
async function advanceStage(){
  const inf=localGet(selectedId);const next=getNextStageId(Number(inf.stage));if(next===null)return;
  const prev=Number(inf.stage);const backup={...inf};
  const extra=next===2?{dm_sent:'Y',dm_sent_date:inf.dm_sent_date||new Date().toISOString().split('T')[0]}:{};
  localUpdate(selectedId,{stage:next,...extra});render();renderPanel();
  syncStart();const r=await api('update',{id:selectedId,stage:next,...extra});syncEnd();
  if(!r.success){localUpdate(selectedId,backup);render();renderPanel();alert('저장 실패')}
}
async function advanceWithDate(field,inputId){
  const inf=localGet(selectedId);const next=getNextStageId(Number(inf.stage));
  const dateVal=document.getElementById(inputId)?.value||'';const prev=Number(inf.stage);const prevField=inf[field];
  localUpdate(selectedId,{stage:next,[field]:dateVal});render();renderPanel();
  syncStart();const r=await api('update',{id:selectedId,stage:next,[field]:dateVal});syncEnd();
  if(!r.success){localUpdate(selectedId,{stage:prev,[field]:prevField});render();renderPanel();alert('저장 실패')}
}
async function confirmIntention(){
  const inf_name=document.getElementById('p-inf-name2').value,phone=document.getElementById('p-phone2').value;
  const inf=localGet(selectedId);const next=getNextStageId(Number(inf.stage));const backup={...inf};
  localUpdate(selectedId,{stage:next,influencer_name:inf_name,phone});render();renderPanel();
  syncStart();const r=await api('update',{id:selectedId,stage:next,influencer_name:inf_name,phone});syncEnd();
  if(!r.success){localUpdate(selectedId,backup);render();renderPanel();alert('저장 실패')}
}
async function completeContract(){
  const contract_date=document.getElementById('p-contract-date').value,special_note=document.getElementById('p-special-note').value;
  const inf=localGet(selectedId);const next=getNextStageId(Number(inf.stage));
  const contract_file=uploadedFiles['p-contract-file']||inf.contract_file||'';const backup={...inf};
  localUpdate(selectedId,{stage:next,contract_sent_date:contract_date,contract_file,special_note});render();renderPanel();
  syncStart();const r=await api('update',{id:selectedId,stage:next,contract_sent_date:contract_date,contract_file,special_note});syncEnd();
  delete uploadedFiles['p-contract-file'];
  if(!r.success){localUpdate(selectedId,backup);render();renderPanel();alert('저장 실패')}
}
async function completeProduct(){
  const product_date=document.getElementById('p-product-date').value,ad_code=document.getElementById('p-ad-code').value;
  const product_only=document.getElementById('p-product-only').checked?'Y':'N';
  if(!ad_code)return alert('광고 코드를 입력해주세요.');
  const inf=localGet(selectedId);const next=getNextStageId(Number(inf.stage));
  let bankbook_file=inf.bankbook_file||'',id_file=inf.id_file||'';
  if(product_only==='N'){if(uploadedFiles['p-bankbook-file'])bankbook_file=uploadedFiles['p-bankbook-file'];if(uploadedFiles['p-id-file'])id_file=uploadedFiles['p-id-file'];}
  const backup={...inf};localUpdate(selectedId,{stage:next,product_sent_date:product_date,ad_code,bankbook_file,id_file,product_only});render();renderPanel();
  syncStart();const r=await api('update',{id:selectedId,stage:next,product_sent_date:product_date,ad_code,bankbook_file,id_file,product_only});syncEnd();
  delete uploadedFiles['p-bankbook-file'];delete uploadedFiles['p-id-file'];
  if(!r.success){localUpdate(selectedId,backup);render();renderPanel();alert('저장 실패')}
}
async function completeAll(){
  const paymentDate=document.getElementById('p-payment-date').value;const backup={...localGet(selectedId)};
  localUpdate(selectedId,{stage:8,status:'done',payment_date:paymentDate});render();renderPanel();
  syncStart();const r=await api('update',{id:selectedId,stage:8,status:'done',payment_date:paymentDate});syncEnd();
  if(!r.success){localUpdate(selectedId,backup);render();renderPanel();alert('저장 실패')}
}
async function rejectInfluencer(){
  if(!confirm('거절 처리할까요?'))return;
  const backup={...localGet(selectedId)};localUpdate(selectedId,{status:'rejected'});render();renderPanel();
  syncStart();const r=await api('update',{id:selectedId,status:'rejected'});syncEnd();
  if(!r.success){localUpdate(selectedId,backup);render();renderPanel()}
}
async function restoreInfluencer(){
  const backup={...localGet(selectedId)};localUpdate(selectedId,{status:'active',stage:0});render();renderPanel();
  syncStart();const r=await api('update',{id:selectedId,status:'active',stage:0});syncEnd();
  if(!r.success){localUpdate(selectedId,backup);render();renderPanel()}
}
async function deleteInfluencer(){
  if(!confirm('완전히 삭제할까요?\n삭제 후 복구 불가능합니다.'))return;
  const deletedId=selectedId;const backup={...localGet(deletedId)};
  localRemove(deletedId);closePanel();render();
  syncStart();
  try{const url=new URL(SCRIPT_URL);url.searchParams.set('action','delete');url.searchParams.set('id',deletedId);const res=await fetch(url.toString());const r=await res.json();syncEnd();if(!r.success){localAdd(backup);render();alert('삭제 실패: '+r.error)}}
  catch(e){syncEnd();localAdd(backup);render();alert('오류: '+e.message)}
}

function setThisMonth(){const now=new Date();document.getElementById('settlement-month').value=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;renderSettlement()}
function renderSettlement(){
  const month=document.getElementById('settlement-month').value;if(!month)return;
  const dmItems=influencers.filter(i=>i.dm_sent_date&&formatDate(i.dm_sent_date).startsWith(month));
  const doneItems=influencers.filter(i=>i.status==='done'&&i.payment_date&&formatDate(i.payment_date).startsWith(month));
  const dmPay=dmItems.length*2000,donePay=doneItems.length*20000,total=dmPay+donePay;
  document.getElementById('dm-count').innerHTML=`${dmItems.length}건 × 2,000원 = <b>${dmPay.toLocaleString()}원</b>`;
  document.getElementById('complete-count').innerHTML=`${doneItems.length}건 × 20,000원 = <b>${donePay.toLocaleString()}원</b>`;
  document.getElementById('total-pay').textContent=total.toLocaleString()+'원';
  const allIds=[...new Set([...dmItems.map(i=>i.id),...doneItems.map(i=>i.id)])];
  const allItems=allIds.map(id=>influencers.find(i=>i.id===id)).filter(Boolean);
  const tbody=document.getElementById('settlement-table');
  if(!allItems.length){tbody.innerHTML=`<tr><td colspan="6"><div class="empty">해당 월 내역 없음</div></td></tr>`;return}
  tbody.innerHTML=allItems.map(i=>{const hDM=i.dm_sent_date&&formatDate(i.dm_sent_date).startsWith(month);const hDone=i.status==='done'&&i.payment_date&&formatDate(i.payment_date).startsWith(month);return`<tr><td>@${i.instagram_id||i.nickname}</td><td>${i.name||'-'}</td><td>${hDM?formatDate(i.dm_sent_date):'-'}</td><td>${hDone?formatDate(i.payment_date):'-'}</td><td>${hDM?'2,000원':'-'}</td><td>${hDone?'20,000원':'-'}</td></tr>`}).join('');
}
function copySettlement(){
  const month=document.getElementById('settlement-month').value;
  const dmCount=influencers.filter(i=>i.dm_sent_date&&formatDate(i.dm_sent_date).startsWith(month)).length;
  const doneCount=influencers.filter(i=>i.status==='done'&&i.payment_date&&formatDate(i.payment_date).startsWith(month)).length;
  const total=(dmCount*2000)+(doneCount*20000);
  navigator.clipboard.writeText(`[${month} 정산]\nDM 발송: ${dmCount}건 × 2,000원 = ${(dmCount*2000).toLocaleString()}원\n협찬 완료: ${doneCount}건 × 20,000원 = ${(doneCount*20000).toLocaleString()}원\n합계: ${total.toLocaleString()}원`).then(()=>alert('클립보드에 복사됐습니다.'));
}
</script>
